<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="danceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#danceGradient)" />
  
  <!-- Simple robot dancer silhouette -->
  <g transform="translate(200, 150)">
    <!-- Head -->
    <circle cx="0" cy="-40" r="20" fill="white" opacity="0.9"/>
    <!-- Body -->
    <rect x="-25" y="-20" width="50" height="60" rx="5" fill="white" opacity="0.9"/>
    <!-- Arms in dance position -->
    <rect x="-45" y="-15" width="20" height="40" rx="5" fill="white" opacity="0.9" transform="rotate(-30 -35 -15)"/>
    <rect x="25" y="-15" width="20" height="40" rx="5" fill="white" opacity="0.9" transform="rotate(30 35 -15)"/>
    <!-- Legs in dance position -->
    <rect x="-20" y="40" width="15" height="40" rx="5" fill="white" opacity="0.9" transform="rotate(-15 -12.5 40)"/>
    <rect x="5" y="40" width="15" height="40" rx="5" fill="white" opacity="0.9" transform="rotate(15 12.5 40)"/>
    
    <!-- Music notes -->
    <text x="-80" y="-50" font-family="Arial" font-size="24" fill="white" opacity="0.7">♪</text>
    <text x="60" y="-30" font-family="Arial" font-size="20" fill="white" opacity="0.7">♫</text>
    <text x="-60" y="20" font-family="Arial" font-size="18" fill="white" opacity="0.7">♪</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">dancerobot.dance</text>
</svg>